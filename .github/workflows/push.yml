name: Push Image

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.9.x

      - name: Cache npm dependencies
        uses: actions/cache@v3
        with:
          path: ui/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('ui/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install ko
        uses: ko-build/setup-ko@v0.7

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | ko login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push image
        run: make push
        env:
          REGISTRY: ghcr.io/${{ github.repository_owner }}/agentregistry-inventory
          KO_DOCKER_REPO: ghcr.io/${{ github.repository_owner }}/agentregistry-inventory
