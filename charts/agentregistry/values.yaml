# Default values for agentregistry controller

# Number of controller replicas (use 2+ for HA with leader election)
replicaCount: 1

image:
  repository: ghcr.io/den-vasyliev/agentregistry-inventory
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Application CR (app.k8s.io/v1beta1) for GKE Marketplace / kubectl-friendly
# grouping of all chart components under a single Application object.
# Requires the Application CRD (cluster-application-controller) to be installed.
application:
  # Set to true to render the Application manifest.
  create: false
  keywords:
    - agent
    - mcp
    - registry
    - kubernetes
    - controller
  maintainers:
    - name: Agent Registry Team
      email: maintainers@agentregistry.dev
  owners: []
  links:
    - description: Project source
      url: https://github.com/den-vasyliev/agentregistry-inventory
  notes: ""
  # Extra annotations to set on the Application object (e.g. marketplace metadata).
  annotations: {}
  # assemblyPhase: Pending | Succeeded (leave empty to omit).
  assemblyPhase: ""

# Controller configuration
controller:
  # Enable leader election for HA deployments
  leaderElection: false

  # Log level (info, debug, warn, error)
  logLevel: info

  # Metrics bind address
  metricsAddr: ":8081"

  # Health probe bind address
  probeAddr: ":8082"

# HTTP API configuration
httpApi:
  # HTTP API bind address
  port: 8080

  # MCP server bind port
  mcpPort: 8083

  # Service type for the HTTP API
  serviceType: ClusterIP

# CRDs are installed from the crds/ directory.
# They are automatically installed before other resources and
# NOT deleted on helm uninstall (Helm standard behavior).

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 10m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Pod Disruption Budget (for HA deployments with replicaCount > 1)
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# Azure AD configuration for MSAL browser PKCE flow.
# Injected as env vars so the Go binary can serve /ui/config.js at runtime.
# No client secret required — PKCE is a public client flow.
# Bearer-token auth toggle for the MCP endpoints and the UI auth-config flag.
#
# NOTE: The HTTP /admin/* API is ALWAYS authenticated and fail-closed regardless
# of this setting — admin routes reject every request until tokens are present in
# the 'agentregistry-api-tokens' Secret. This toggle only governs the MCP server's
# Bearer-token enforcement and the authEnabled flag served to the UI.
#
# Defaults to false (auth enabled) so the deployment is secure out of the box.
# Set to true only when auth is handled entirely by the gateway, or for a
# throwaway dev/demo cluster.
disableAuth: false

# Namespaces that catalog items may be deployed into. By default only the
# controller's own release namespace is allowed, preventing a caller from using
# the controller's cluster-wide RBAC to schedule workloads into arbitrary
# namespaces. Add namespaces here to widen the allowlist, e.g. ["team-a", "team-b"].
allowedDeployNamespaces: []

azure:
  tenantId: ""
  clientId: ""
  # redirectUri: override the MSAL redirect URI when it differs from window.location.origin.
  # Required when the registered Azure AD SPA redirect URI doesn't match the app's origin
  # (e.g. during migration from NextAuth where the old URI was /api/auth/callback/oidc).
  # Leave empty to auto-detect from window.location.origin.
  redirectUri: ""

# HTTPRoute configuration (Gateway API)
httpRoute:
  enabled: false
  hostname: agentregistry.example.com
  gatewayName: mcp-gateway
  gatewayNamespace: ""
  sectionName: https
