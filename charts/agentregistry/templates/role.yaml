apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "agentregistry.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentregistry.labels" . | nindent 4 }}
rules:
  # Secrets (for API tokens) — scoped to the controller namespace only.
  # The controller reads exactly one Secret, 'agentregistry-api-tokens',
  # in its own namespace, so cluster-wide Secret access is unnecessary.
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "agentregistry.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentregistry.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "agentregistry.fullname" . }}-controller
subjects:
  - kind: ServiceAccount
    name: {{ include "agentregistry.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
