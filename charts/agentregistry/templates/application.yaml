{{- if .Values.application.create }}
apiVersion: app.k8s.io/v1beta1
kind: Application
metadata:
  name: {{ include "agentregistry.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentregistry.labels" . | nindent 4 }}
  {{- with .Values.application.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  descriptor:
    type: agentregistry
    version: {{ .Chart.AppVersion | quote }}
    description: {{ .Chart.Description | quote }}
    {{- with .Values.application.keywords }}
    keywords:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.application.maintainers }}
    maintainers:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.application.owners }}
    owners:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.application.links }}
    links:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .Values.application.notes }}
    notes: {{ . | quote }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "agentregistry.selectorLabels" . | nindent 6 }}
  componentKinds:
    - group: apps
      kind: Deployment
    - group: ""
      kind: Service
    - group: ""
      kind: ServiceAccount
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    {{- if .Values.httpRoute.enabled }}
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
    {{- end }}
  {{- with .Values.application.assemblyPhase }}
  assemblyPhase: {{ . }}
  {{- end }}
{{- end }}
